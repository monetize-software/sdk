<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>@monetize.software/sdk-react — demo</title>
    <style>
      :root {
        font-family: ui-sans-serif, system-ui, sans-serif;
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: #f3f4f6;
        color: #111827;
        padding: 32px 16px;
      }
      .container {
        max-width: 720px;
        margin: 0 auto;
        display: grid;
        gap: 16px;
      }
      .card {
        background: white;
        padding: 20px 24px;
        border-radius: 14px;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
      }
      h1 {
        margin: 0 0 4px;
        font-size: 22px;
      }
      h2 {
        margin: 0 0 12px;
        font-size: 16px;
        color: #6b7280;
      }
      p {
        margin: 0 0 12px;
        font-size: 14px;
      }
      .row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      button {
        height: 38px;
        padding: 0 16px;
        border-radius: 10px;
        border: none;
        background: #111827;
        color: white;
        font-weight: 500;
        cursor: pointer;
      }
      button.secondary {
        background: #e5e7eb;
        color: #111827;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      pre {
        font-size: 12px;
        background: #f9fafb;
        padding: 12px;
        border-radius: 8px;
        margin: 0;
        max-height: 200px;
        overflow: auto;
        white-space: pre-wrap;
      }
      .pill {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        background: #e0e7ff;
        color: #4338ca;
        font-size: 12px;
        font-weight: 600;
      }
      .pill.granted {
        background: #dcfce7;
        color: #166534;
      }
      .pill.blocked {
        background: #fee2e2;
        color: #991b1b;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
